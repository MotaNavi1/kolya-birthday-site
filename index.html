<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Коля! 🎉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: #0a0015;
            color: white;
            margin: 0;
        }
        
        .neon-text {
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #00ffff;
        }
        
        .section {
            min-height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        #slideshow img {
            max-height: 60vh;
            border: 6px solid #ff00ff;
            border-radius: 1.5rem;
            box-shadow: 0 0 40px #ff00ff80;
            transition: opacity 1s ease-in-out;
        }
        
        .nav-dots {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            display: flex;
            gap: 0.75rem;
        }
        
        .nav-dots button {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .nav-dots button.active {
            background: #00ffff;
            box-shadow: 0 0 15px #00ffff;
            transform: scale(1.3);
        }
        
        .video-wrapper {
            width: 90%;
            max-width: 960px;
            aspect-ratio: 16 / 9;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,255,255,0.4);
            background: black;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="snap-y snap-mandatory overflow-y-scroll h-screen">

    <!-- Точки навигации -->
    <div class="nav-dots">
        <button onclick="document.getElementById('s1').scrollIntoView({behavior:'smooth'})" class="active"></button>
        <button onclick="document.getElementById('s2').scrollIntoView({behavior:'smooth'})"></button>
        <button onclick="document.getElementById('s3').scrollIntoView({behavior:'smooth'})"></button>
        <button onclick="document.getElementById('s4').scrollIntoView({behavior:'smooth'})"></button>
    </div>

    <!-- 1. Поздравление + воспоминания (фото) -->
    <section id="s1" class="section bg-gradient-to-br from-purple-950 via-black to-cyan-950">
        <div class="w-full max-w-4xl">
            <h1 class="text-6xl md:text-8xl font-bold neon-text mb-8 leading-tight">
                С ДНЁМ РОЖДЕНИЯ,<br>КОЛЯ! 🎉
            </h1>
            <p class="text-3xl text-cyan-300 mb-12">Ну что, вспомним тебя в прошлом?</p>
            
            <div id="slideshow" class="mx-auto">
                <img id="currentPhoto" src="" alt="Воспоминание">
            </div>
            <p id="photoCounter" class="mt-6 text-pink-400 text-xl">1 / ?</p>
        </div>
    </section>

    <!-- 2. Тест на IQ (мини-задания) -->
    <section id="s2" class="section bg-gradient-to-b from-black to-purple-950">
        <div class="max-w-4xl w-full">
            <h1 class="text-6xl neon-text mb-10">ТЕСТ НА IQ<br>ПРОЙДЁШЬ ЛИ?</h1>
            <p class="text-2xl text-cyan-200 mb-12">3 лёгких задания ниже ↓</p>
            
            <!-- Здесь вставь свои 3 мини-игры (кнопки, ловилка и т.д.) -->
            <!-- Пример заглушки: -->
            <div class="space-y-8">
                <button class="bg-pink-600 hover:bg-pink-500 text-white text-2xl px-12 py-6 rounded-2xl w-full max-w-md mx-auto block"
                        onclick="alert('Задание 1 пройдено! Далее ↓')">
                    Найди правильную кнопку (нажми меня)
                </button>
                <p class="text-xl">...добавь ещё 2 задания...</p>
            </div>
        </div>
    </section>

    <!-- 3. Видео -->
    <section id="s3" class="section bg-black">
        <div class="w-full max-w-5xl">
            <h1 class="text-6xl neon-text mb-12">РАССЛАБЬСЯ И СМОТРИ 🥱</h1>
            
            <div class="video-wrapper mx-auto">
                <iframe 
                    src="https://www.youtube.com/embed/y1F5NJgLLt0?rel=0&modestbranding=1&showinfo=0&controls=1&autoplay=0" 
                    title="Поздравление Коле" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>

    <!-- 4. Финал -->
    <section id="s4" class="section bg-black">
        <div>
            <h1 class="text-6xl md:text-8xl font-bold bg-gradient-to-r from-pink-500 to-cyan-400 bg-clip-text text-transparent mb-8">
                ЕЩЁ РАЗ С ДНЁМ РОЖДЕНИЯ,<br>КОЛЯ 🫡
            </h1>
            <p class="text-4xl text-yellow-300 tracking-widest animate-pulse">
                КОГДА МИНИ-ИГРЫ, КОЛЯ? 😏
            </p>
        </div>
    </section>

    <script>
        // Фото-слайдшоу
        const photos = [
            'photos/1.jpg',
            'photos/2.jpg',
            'photos/3.jpg',
            'photos/4.jpg',
            // добавь все свои фото сюда, например 'photos/meme.jpg',
        ];
        let current = 0;
        const photoEl = document.getElementById('currentPhoto');
        const counterEl = document.getElementById('photoCounter');

        if (photos.length > 0) {
            photoEl.src = photos[0];
            counterEl.textContent = `1 / ${photos.length}`;
            
            setInterval(() => {
                current = (current + 1) % photos.length;
                photoEl.style.opacity = '0';
                setTimeout(() => {
                    photoEl.src = photos[current];
                    photoEl.style.opacity = '1';
                    counterEl.textContent = `${current + 1} / ${photos.length}`;
                }, 800);
            }, 3500); // меняется каждые 3.5 секунды
        }

        // Конфетти в фоне (иногда)
        setInterval(() => {
            if (window.scrollY < window.innerHeight * 2) {
                confetti({
                    particleCount: 80,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }
        }, 7000);

        // Подсветка активной точки при скролле
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('.section');
            let currentSection = 1;
            sections.forEach((sec, i) => {
                if (window.scrollY >= sec.offsetTop - 100) {
                    currentSection = i + 1;
                }
            });
            document.querySelectorAll('.nav-dots button').forEach((btn, idx) => {
                btn.classList.toggle('active', idx + 1 === currentSection);
            });
        });
    </script>
</body>
</html>
